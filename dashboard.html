<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | EVOZXa FUTURE</title>
    <link rel="stylesheet" href="./css/app.css">
</head>
<body>
    <div id="app">
        <!-- Header Sama dengan index.html -->
        <header class="topbar">
            <div class="brand">
                <img src="./images/logo.png" alt="EVOZXa">
                <span>EVOZXa FUTURE</span>
            </div>
            <button id="connectBtn">Connect Wallet</button>
        </header>

        <main class="container">
            <section class="hero">
                <h1>My Deployed Tokens</h1>
                <p>Manage your smart contracts on EVOZ Mainnet.</p>
            </section>

            <section class="card">
                <table id="tokenTable">
                    <thead>
                        <tr>
                            <th>Token Name</th>
                            <th>Symbol</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tokenList">
                        <!-- Token akan muncul di sini otomatis -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <script type="module" src="./js/app.js"></script>
</body>
</html>
