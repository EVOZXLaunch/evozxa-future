<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | EVOZXa FUTURE</title>
    <link rel="stylesheet" href="./css/app.css">
</head>
<body>

<header class="topbar">
    <div class="brand">
        <img src="./images/logo.png" alt="EVOZXa">
        <span>EVOZXa FUTURE</span>
    </div>
    <nav class="nav-links">
        <a href="index.html">Deploy</a>
        <a href="dashboard.html" style="color: var(--gold); font-weight: bold;">Dashboard</a>
    </nav>
</header>

<main class="container">
    <section class="hero">
        <h1>Your Deployed Tokens</h1>
        <p>Manage and verify your smart contracts from here.</p>
    </section>

    <section class="card">
        <table id="tokenTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Symbol</th>
                    <th>Address</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tokenList">
                </tbody>
        </table>
        <div id="noTokens" style="text-align: center; padding: 20px; color: var(--muted); display: none;">
            No tokens found. Deploy one first!
        </div>
    </section>
</main>

<script type="module" src="./js/dashboard.js"></script>
</body>
</html>
