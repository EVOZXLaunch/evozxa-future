<script type="module" src="./js/app.js"></script>
<script type="module" src="./js/main.js"></script>
<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01EVOZXFUTURE#@$%&*";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];

for (let i = 0; i < columns; i++) {
    drops[i] = 1;
}

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00f5ff";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(draw, 33);
</script>

<script>
/* =========================
   AI TYPING EFFECT
========================= */
const heroText = document.getElementById("heroText");

const text = "Create Professional Tokens On EVOZ";
let i = 0;

heroText.textContent = "";

function type(){
if(i < text.length){
heroText.textContent += text.charAt(i);
i++;
setTimeout(type, 60);
}
}

type();

/* =========================
   STATUS PULSE (SIMULATED)
========================= */
const statusText = document.getElementById("statusText");

setInterval(() => {
const states = ["SYSTEM READY", "SYNCING CHAIN...", "WALLET SCANNED", "NETWORK STABLE"];
statusText.textContent = states[Math.floor(Math.random()*states.length)];
}, 3000);
</script>
