<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVOZXA FUTURE</title>

<link rel="stylesheet" href="./css/app.css">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>
</head>

<body>

<div id="app">

<!-- TOPBAR -->
<header class="topbar">

<div class="brand">
<img src="./images/logo.png" />
<span>EVOZXA FUTURE</span>
</div>

<button id="connectBtn">Connect Wallet</button>

</header>

<main class="container">

<!-- HERO -->
<section class="hero">

<h1>Token Launch Wizard</h1>
<p>Deploy smart contracts on EVOZ Mainnet with full control system</p>

<div class="wallet-info">

<div class="wallet-item">
<span>Wallet</span>
<strong id="walletAddress">Not Connected</strong>
</div>

<div class="wallet-item">
<span>EVOZ</span>
<strong id="evozBalance">0.00</strong>
</div>

<div class="wallet-item">
<span>EVOZX</span>
<strong id="evozxBalance">0.00</strong>
</div>

</div>

</section>

<!-- GRID -->
<div class="grid">

<!-- LEFT: WIZARD -->
<section class="card">

<h2>Launch Wizard</h2>

<div style="margin-bottom:12px;">
Step <span id="stepNow">1</span> / 4
</div>

<form id="tokenForm">

<!-- STEP 1 -->
<div class="wizard-step" data-step="1">

<h3>Basic Info</h3>

<input id="name" type="text" placeholder="Token Name" />
<input id="symbol" type="text" placeholder="Symbol" />
<input id="supply" type="number" placeholder="Total Supply" />

</div>

<!-- STEP 2 -->
<div class="wizard-step" data-step="2" style="display:none">

<h3>Core Features</h3>

<div class="features-box">

<label><input type="checkbox" id="burnable"> Burnable</label>
<label><input type="checkbox" id="mintable"> Mintable</label>
<label><input type="checkbox" id="ownership"> Ownership</label>
<label><input type="checkbox" id="tradingControl"> Trading Control</label>

</div>

</div>

<!-- STEP 3 -->
<div class="wizard-step" data-step="3" style="display:none">

<h3>Metadata</h3>

<input id="websiteUrl" placeholder="Website URL" />
<input id="telegramUrl" placeholder="Telegram URL" />
<input id="twitterUrl" placeholder="Twitter URL" />
<input id="logoUrl" placeholder="Logo URL" />

<h3>Tax Settings</h3>

<input id="buyTaxValue" type="number" placeholder="Buy Tax %" />
<input id="sellTaxValue" type="number" placeholder="Sell Tax %" />
<input id="burnTaxShare" type="number" placeholder="Burn Share %" />

<h3>Wallet Routing</h3>

<input id="marketingWallet" placeholder="Marketing Wallet" />
<input id="developmentWallet" placeholder="Development Wallet" />

</div>

<!-- STEP 4 -->
<div class="wizard-step" data-step="4" style="display:none">

<h3>Limits</h3>

<label>
<input type="checkbox" id="maxWalletEnabled"> Enable Max Wallet
</label>
<input id="maxWalletValue" type="number" placeholder="Max Wallet %" />

<label>
<input type="checkbox" id="maxTxEnabled"> Enable Max TX
</label>
<input id="maxTxValue" type="number" placeholder="Max TX %" />

</div>

</form>

<!-- NAVIGATION -->
<div style="display:flex; gap:10px; margin-top:20px;">

<button id="prevStep">Back</button>
<button id="nextStep">Next</button>

</div>

</section>

<!-- RIGHT: SUMMARY -->
<section class="card">

<h2>Live Deployment Summary</h2>

<div class="summary-row">
<span>EVOZX Fee</span>
<strong id="evozxFee">0</strong>
</div>

<div class="summary-row">
<span>EVOZ Gas</span>
<strong id="evozFee">0</strong>
</div>

<button id="deployBtn" style="width:100%; margin-top:20px;">
Deploy Token
</button>

</section>

</div>

</main>

</div>

<!-- SCRIPTS -->
<script type="module" src="./js/main.js"></script>
<script type="module" src="./js/wizard.js"></script>
<script type="module" src="./js/fee-realtime.js"></script>

</body>
</html>
