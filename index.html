<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVOZXA FUTURE</title>
    <link rel="stylesheet" href="./css/app.css">
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>
</head>
<body>

<div id="app">
    <header class="topbar">
        <div class="brand">
            <img src="./images/logo.png" alt="EVOZXA">
            <span>EVOZXA FUTURE</span>
        </div>
        <button id="connectBtn">Connect Wallet</button>
    </header>

    <main class="container">
        <section class="hero">
            <h1>Create Professional Tokens On EVOZ</h1>
            <p>Deploy, Verify and Manage smart contracts directly on EVOZ Mainnet.</p>
            <div id="walletInfo" class="wallet-info">
                <div class="wallet-item"><span>Wallet</span><strong id="walletAddress">Not Connected</strong></div>
                <div class="wallet-item"><span>EVOZ</span><strong id="evozBalance">0.00</strong></div>
                <div class="wallet-item"><span>EVOZX</span><strong id="evozxBalance">0.00</strong></div>
            </div>
        </section>

        <div class="grid">
            <section class="card">
                <h2>Token Configuration</h2>
                <form id="tokenForm">
                    <input id="name" type="text" placeholder="Token Name">
                    <input id="symbol" type="text" placeholder="Symbol">
                    <input id="supply" type="number" placeholder="Total Supply">

                    <div class="features-box">
                        <h3>Features</h3>
                        <div class="checkbox-grid">
                            <label><input type="checkbox" id="burnable"> Burnable</label>
                            <label><input type="checkbox" id="mintable"> Mintable</label>
                            <label><input type="checkbox" id="ownership"> Ownership</label>
                            <label><input type="checkbox" id="maxWallet"> Max Wallet</label>
                            <label><input type="checkbox" id="maxTx"> Max TX</label>
                            <label><input type="checkbox" id="tradingControl"> Trading Control</label>
                            <label><input type="checkbox" id="buyTax"> Buy Tax</label>
                            <label><input type="checkbox" id="sellTax"> Sell Tax</label>
                        </div>
                    </div>

                    <div class="accordion-item">
                        <div class="accordion-header" onclick="toggleAcc(this)">METADATA ▼</div>
                        <div class="accordion-content">
                            <div class="feature-wrapper"><label><input type="checkbox" onchange="toggleInput(this)"> Website</label><input id="websiteUrl" type="text" class="hidden-input" placeholder="Website URL" disabled></div>
                            <div class="feature-wrapper"><label><input type="checkbox" onchange="toggleInput(this)"> Telegram</label><input id="telegramUrl" type="text" class="hidden-input" placeholder="Telegram URL" disabled></div>
                            <div class="feature-wrapper"><label><input type="checkbox" onchange="toggleInput(this)"> Twitter</label><input id="twitterUrl" type="text" class="hidden-input" placeholder="Twitter URL" disabled></div>
                            <div class="feature-wrapper"><label><input type="checkbox" onchange="toggleInput(this)"> Logo</label><input id="logoUrl" type="text" class="hidden-input" placeholder="Logo URL" disabled></div>
                        </div>
                    </div>

                    <div class="accordion-item">
                        <div class="accordion-header" onclick="toggleAcc(this)">ADVANCED SETTINGS ▼</div>
                        <div class="accordion-content">
                            <div class="feature-wrapper"><label><input type="checkbox" onchange="toggleInput(this)"> Max Wallet</label><input id="maxWalletValue" type="number" class="hidden-input" placeholder="Max Wallet %" disabled></div>
                            <div class="feature-wrapper"><label><input type="checkbox" onchange="toggleInput(this)"> Max TX</label><input id="maxTxValue" type="number" class="hidden-input" placeholder="Max TX %" disabled></div>
                            <div class="feature-wrapper"><label><input type="checkbox" onchange="toggleInput(this)"> Buy Tax</label><input id="buyTaxValue" type="number" class="hidden-input" placeholder="Buy Tax %" disabled></div>
                            <div class="feature-wrapper"><label><input type="checkbox" onchange="toggleInput(this)"> Sell Tax</label><input id="sellTaxValue" type="number" class="hidden-input" placeholder="Sell Tax %" disabled></div>
                        </div>
                    </div>
                </form>
            </section>

            <section class="card">
                <h2>Deployment Summary</h2>
                <div id="summary">
                    <div class="summary-row"><span>Total EVOZX Fee</span><strong id="evozxFee">10</strong></div>
                    <div class="summary-row"><span>Total EVOZ Value</span><strong id="evozFee">50</strong></div>
                </div>
                <button id="deployBtn">Deploy Token</button>
            </section>
        </div>
    </main>
</div>
    
<script type="module" src="./js/main.js"></script>
<script type="module" src="./js/app.js"></script>
</body>
</html>
