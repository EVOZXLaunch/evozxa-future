<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVOZXa FUTURE</title>
    <link rel="stylesheet" href="./css/app.css">
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>
    <style>
        /* FIX: Paksa accordion tersembunyi secara default */
        .main-accordion-content, .sub-accordion-content { display: none; }
        
        /* FIX: Layout Grid agar tidak berantakan di HP */
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Mobile Breakpoint */
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .topbar { flex-direction: column; gap: 10px; }
        }
        
        /* Styling tambahan agar rapi */
        .main-accordion-header { cursor: pointer; display: block; padding: 10px; background: rgba(255,255,255,0.05); margin-top: 10px; border-radius: 8px; }
        .sub-accordion-item { margin-top: 8px; padding-left: 10px; }
    </style>
</head>
<body>

<div id="app">
    <header class="topbar">
        <div class="brand">
            <img src="./images/logo.png" alt="EVOZXa">
            <span>EVOZXa FUTURE</span>
        </div>
        <nav class="nav-links">
            <a href="index.html" style="color: var(--gold);">Deploy</a>
            <a href="dashboard.html" style="color: white;">Dashboard</a>
        </nav>
        <button id="connectBtn">Connect Wallet</button>
    </header>

    <main class="container">
        <section class="hero">
            <h1>Launch Professional Tokens On EVOZ</h1>
            <div id="walletInfo" class="wallet-info">
                <div class="wallet-item"><span>Wallet</span><strong id="walletAddress">Not Connected</strong></div>
                <div class="wallet-item"><span>EVOZ</span><strong id="evozBalance">0.00</strong></div>
                <div class="wallet-item"><span>EVOZX</span><strong id="evozxBalance">0.00</strong></div>
            </div>
        </section>

        <div class="grid">
            <section class="card">
                <h2>Token Configuration</h2>
                <form id="tokenForm">
                    <input id="name" type="text" placeholder="Token Name" />
                    <input id="symbol" type="text" placeholder="Symbol" />
                    <input id="supply" type="number" placeholder="Total Supply" />
                    
                    <div class="features-box" style="margin: 15px 0;">
                        <h3>Features</h3>
                        <label><input type="checkbox" id="burnable"> Burnable</label>
                        <label><input type="checkbox" id="mintable"> Mintable</label>
                        <label><input type="checkbox" id="ownership"> Ownership</label>
                    </div>

                    <div class="main-accordion-item">
                        <label class="main-accordion-header" onclick="toggleElement('metaContent')">METADATA ▼</label>
                        <div id="metaContent" class="main-accordion-content">
                            <input id="websiteUrl" type="text" placeholder="Website URL" />
                            <input id="telegramUrl" type="text" placeholder="Telegram URL" />
                            <input id="twitterUrl" type="text" placeholder="Twitter URL" />
                            <input id="logoUrl" type="text" placeholder="Logo URL" />
                        </div>
                    </div>

                    <div class="main-accordion-item">
                        <label class="main-accordion-header" onclick="toggleElement('advContent')">ADVANCED SETTINGS ▼</label>
                        <div id="advContent" class="main-accordion-content">
                            <input id="maxWalletValue" type="number" placeholder="Max Wallet %" />
                            <input id="maxTxValue" type="number" placeholder="Max TX %" />
                            <input id="buyTaxValue" type="number" placeholder="Buy Tax %" />
                            <input id="sellTaxValue" type="number" placeholder="Sell Tax %" />
                            <input id="burnTaxShare" type="number" placeholder="Burn Tax Share %" />
                            <input id="marketingWallet" type="text" placeholder="Marketing Wallet" />
                            <input id="developmentWallet" type="text" placeholder="Development Wallet" />
                        </div>
                    </div>
                </form>
            </section>

            <section class="card">
                <h2>Summary</h2>
                <div id="summary">
                    <div class="summary-row"><span>Fee</span><strong id="evozxFee">10</strong></div>
                </div>
                <button id="deployBtn" style="width: 100%; padding: 15px; margin-top: 20px;">Deploy Token</button>
            </section>
        </div>
    </main>
</div>

<script>
    // FUNGSI PENGGANTI CHECKBOX TOGGLE BIAR GAK BUGGY
    function toggleElement(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === "block") ? "none" : "block";
    }
</script>
<script type="module" src="./js/app.js"></script>
</body>
</html>
