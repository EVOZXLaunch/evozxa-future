<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVOZXA FUTURE</title>

<link rel="stylesheet" href="./css/app.css">

<!-- FONT -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<!-- BACKGROUND LAYERS (ORDER FIXED) -->

<div id="app">

<header class="topbar">

<img src="./images/logo.png" alt="EVOZXA">

</header>

<main class="container">

<!-- HERO -->

<p>
Deploy, Verify and Manage smart contracts directly
on EVOZ Mainnet.
</p>

<!-- STATUS (FIXED OUT OF GRID) -->

</div>

<!-- WALLET INFO -->

<span>Wallet</span>
<strong id="walletAddress">Not Connected</strong>
</div>

<div class="wallet-item">
<span>EVOZ</span>
<strong id="evozBalance">0.00</strong>
</div>

<div class="wallet-item">
<span>EVOZX</span>
<strong id="evozxBalance">0.00</strong>
</div>

</div>

</section>

<!-- GRID -->
<div class="grid">

<!-- LEFT CARD -->
<section class="card">

<form id="tokenForm">

<input id="symbol" type="text" placeholder="Symbol"/>

<label><input type="checkbox" id="burnable"><span>Burnable</span></label>
<label><input type="checkbox" id="mintable"><span>Mintable</span></label>
<label><input type="checkbox" id="ownership"><span>Ownership</span></label>
<label><input type="checkbox" id="maxWallet"><span>Max Wallet</span></label>
<label><input type="checkbox" id="maxTx"><span>Max TX</span></label>
<label><input type="checkbox" id="tradingControl"><span>Trading Control</span></label>
<label><input type="checkbox" id="buyTax"><span>Buy Tax</span></label>
<label><input type="checkbox" id="sellTax"><span>Sell Tax</span></label>
<label><input type="checkbox" id="website"><span>Website</span></label>
<label><input type="checkbox" id="telegram"><span>Telegram</span></label>
<label><input type="checkbox" id="twitter"><span>Twitter</span></label>
<label><input type="checkbox" id="logo"><span>Logo</span></label>

</div>

</div>

<h3>Metadata</h3>

<div class="advanced-box">

<input id="websiteUrl" type="text" placeholder="Website URL"/>
<input id="telegramUrl" type="text" placeholder="Telegram URL"/>
<input id="twitterUrl" type="text" placeholder="Twitter URL"/>
<input id="logoUrl" type="text" placeholder="Logo URL"/>

<h3 class="section-space">Advanced Settings</h3>

<input id="buyTaxValue" type="number" placeholder="Buy Tax %"/>
<input id="sellTaxValue" type="number" placeholder="Sell Tax %"/>
<input id="maxWalletValue" type="number" placeholder="Max Wallet %"/>
<input id="maxTxValue" type="number" placeholder="Max TX %"/>
<input id="burnTaxShare" type="number" placeholder="Burn Tax Share %"/>
<input id="marketingWallet" type="text" placeholder="Marketing Wallet"/>
<input id="developmentWallet" type="text" placeholder="Development Wallet"/>

</div>

</form>

</section>

<!-- RIGHT CARD -->
<section class="card">

<h2>Deployment Summary</h2>

<div id="summary">

<div class="summary-row">
<span>Total EVOZX Fee</span>
<strong id="evozxFee">10</strong>
</div>

<div class="summary-row">
<span>Total EVOZ Value</span>
<strong id="evozFee">50</strong>
</div>

</div>

<button id="deployBtn">Deploy Token</button>

</section>

</div>

</main>

</div>

<!-- SCRIPTS -->
<script type="module" src="./js/app.js"></script>
<script type="module" src="./js/main.js"></script>

<!-- MATRIX -->
<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01EVOZXFUTURE#@$%&*";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = Array.from({length: columns}, () => 1);

function draw(){
ctx.fillStyle = "rgba(0,0,0,0.08)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "#d4af37";
ctx.font = fontSize + "px monospace";

for(let i=0;i<drops.length;i++){
const text = letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize > canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;
}
}

setInterval(draw,33);
</script>

<!-- UI LOGIC -->
<script>
const heroText = document.getElementById("heroText");
const text = "Create Professional Tokens On EVOZ";
let i = 0;

heroText.textContent = "";

(function type(){
if(i < text.length){
heroText.textContent += text.charAt(i++);
setTimeout(type, 60);
}
})();

const statusText = document.getElementById("statusText");

setInterval(() => {
const states = [
"SYSTEM READY",
"SYNCING CHAIN...",
"WALLET SCANNED",
"NETWORK STABLE"
];
statusText.textContent = states[Math.floor(Math.random()*states.length)];
}, 3000);
</script>

</body>
</html>
